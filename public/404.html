<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = location.pathname + location.search + location.hash;
        sessionStorage.redirect = path;
        location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
